<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leitor DANFE & Roteirizador Mobile</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" type="text/javascript"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 15px; background-color: #f4f4f9; color: #333; -webkit-text-size-adjust: 100%; }
        h1 { color: #0056b3; font-size: 22px; text-align: center; }
        h2 { color: #333; font-size: 16px; margin-top: 20px; }
        .btn { background-color: #007bff; color: white; padding: 14px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 5px 0; display: block; width: 100%; text-align: center; box-sizing: border-box; font-weight: bold; }
        .btn:active { opacity: 0.8; }
        .btn-scan { background-color: #f39c12; }
        .btn-maps { background-color: #28a745; margin-top: 20px; }
        
        /* Container da câmera ajustado */
        #reader-wrapper { width: 100%; max-width: 100%; margin: 15px 0; display: none; position: relative; }
        #reader { width: 100%; border: 2px solid #007bff; border-radius: 8px; overflow: hidden; background-color: #000; }
        
        /* Linha vermelha guia para ajudar a alinhar o código de barras comprido */
        .laser-line { position: absolute; top: 50%; left: 5%; width: 90%; height: 2px; background-color: red; box-shadow: 0 0 8px red; z-index: 10; pointer-events: none; }
        
        .file-input-wrapper { margin: 15px 0; }
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 500px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

    <h1>Leitor de DANFE & Roteirizador</h1>
    
    <h2>1. Escanear Código de Barras</h2>
    <button id="btnIniciarCamera" class="btn btn-scan" onclick="alternarCamera()">Iniciar Câmera</button>
    <div id="reader-wrapper">
        <div class="laser-line"></div>
        <div id="reader"></div>
    </div>
    
    <h2>2. Selecionar Pasta ou Arquivos XML</h2>
    <div class="file-input-wrapper">
        <label for="xmlFolder" class="btn">Carregar XMLs</label>
        <input type="file" id="xmlFolder" webkitdirectory directory multiple accept=".xml,text/xml" style="display: none;" onchange="processarXMLs(this.files)">
        <span id="fileCount" style="display:block; text-align:center; margin-top:5px; font-size:14px; color:#666;">Nenhum arquivo selecionado</span>
    </div>

    <h2>Listagem de Notas Fiscais</h2>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Nº NF</th>
                    <th>Endereço Destinatário</th>
                    <th>Download XML</th>
                    <th>Chave de Acesso</th>
                </tr>
            </thead>
            <tbody id="resultadoTabela">
                </tbody>
        </table>
    </div>

    <button class="btn btn-maps" onclick="gerarRotaMaps()">Abrir Rota no Google Maps</button>

    <script>
        const notasFiscais = {};
        let html5Qrcode = null;
        let cameraAtiva = false;

        function alternarCamera() {
            const wrapperDiv = document.getElementById("reader-wrapper");
            const btn = document.getElementById("btnIniciarCamera");

            if (!html5Qrcode) {
                // Instancia especificando estritamente os formatos aceitos para otimizar processamento
                html5Qrcode = new Html5Qrcode("reader", { 
                    verbose: false,
                    formatsToSupport: [ Html5QrcodeSupportedFormats.CODE_128 ]
                });
            }

            if (!cameraAtiva) {
                wrapperDiv.style.display = "block";
                btn.innerText = "Parar Câmera";
                btn.style.backgroundColor = "#e74c3c";

                // Configurações críticas para códigos de barras longos (CODE128 de 44 dígitos)
                const config = { 
                    fps: 20, // Aumentado para processar mais frames por segundo
                    qrbox: function(viewfinderWidth, viewfinderHeight) {
                        // Cria uma área de leitura bem larga e fina, ideal para o código da DANFE
                        return { 
                            width: Math.floor(viewfinderWidth * 0.9), 
                            height: Math.floor(viewfinderHeight * 0.3) 
                        };
                    },
                    // Força resoluções maiores se o celular suportar, ajudando no foco de linhas finas
                    videoConstraints: {
                        facingMode: "environment",
                        aspectRatio: { ideal: 1.7777777778 },
                        width: { min: 640, ideal: 1280, max: 1920 },
                        height: { min: 480, ideal: 720, max: 1080 }
                    }
                };

                html5Qrcode.start(
                    { facingMode: "environment" }, 
                    config, 
                    (decodedText) => {
                        // Limpa qualquer caractere não numérico
                        const chave = decodedText.replace(/\D/g, '');
                        if (chave.length === 44) {
                            adicionarChaveNaTabela(chave);
                            if (navigator.vibrate) navigator.vibrate(100); // Vibra ao ler
                        }
                    },
                    (errorMessage) => { /* Silencioso para não travar desempenho */ }
                ).then(() => {
                    cameraAtiva = true;
                }).catch(err => {
                    console.error(err);
                    alert("Erro ao acessar a câmera. Verifique as permissões de privacidade.");
                    resetarBotaoCamera();
                });

            } else {
                html5Qrcode.stop().then(() => {
                    resetarBotaoCamera();
                }).catch(err => console.error(err));
            }
        }

        function resetarBotaoCamera() {
            const wrapperDiv = document.getElementById("reader-wrapper");
            const btn = document.getElementById("btnIniciarCamera");
            wrapperDiv.style.display = "none";
            btn.innerText = "Iniciar Câmera";
            btn.style.backgroundColor = "#f39c12";
            cameraAtiva = false;
        }

        // --- GERENCIAMENTO DA TABELA ---
        function adicionarChaveNaTabela(chave) {
            if (notasFiscais[chave]) return; 

            const numNF = parseInt(chave.substring(25, 34), 10);
            
            notasFiscais[chave] = {
                chave: chave,
                numNF: numNF,
                endereco: "Aguardando XML..."
            };

            atualizarTabelaUI();
        }

        function atualizarTabelaUI() {
            const tbody = document.getElementById("resultadoTabela");
            tbody.innerHTML = "";

            Object.values(notasFiscais).forEach(nota => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><strong>${nota.numNF}</strong></td>
                    <td>${nota.endereco}</td>
                    <td><a href="https://meudanfe.com.br/" target="_blank" style="color:#007bff; font-weight:bold;">Baixar</a></td>
                    <td style="font-size: 11px; color: #666; word-break: break-all;">${nota.chave}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- PROCESSAMENTO DE ARQUIVOS XML ---
        function processarXMLs(files) {
            if (!files || files.length === 0) return;

            const xmlFiles = Array.from(files).filter(file => {
                return file.name.toLowerCase().endsWith('.xml') || file.type === "text/xml";
            });

            document.getElementById("fileCount").innerText = `${xmlFiles.length} arquivo(s) XML carregado(s).`;

            xmlFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    parserXML(e.target.result);
                };
                reader.readAsText(file);
            });
        }

        function parserXML(xmlText) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            
            let chaveNode = xmlDoc.getElementsByTagName("chNFe")[0];
            if (!chaveNode) {
                const infNFe = xmlDoc.getElementsByTagName("infNFe")[0];
                if (infNFe) {
                    let idAttr = infNFe.getAttribute("Id");
                    if (idAttr) chaveNode = { textContent: idAttr.replace('NFe', '') };
                }
            }

            if (chaveNode) {
                const chave = chaveNode.textContent.trim();
                if (notasFiscais[chave]) {
                    const enderDest = xmlDoc.getElementsByTagName("enderDest")[0];
                    if (enderDest) {
                        const xLgr = enderDest.getElementsByTagName("xLgr")[0]?.textContent || "";
                        const nro = enderDest.getElementsByTagName("nro")[0]?.textContent || "";
                        const cep = enderDest.getElementsByTagName("CEP")[0]?.textContent || "";
                        
                        notasFiscais[chave].endereco = `${xLgr}, ${nro} - CEP: ${cep}`;
                        atualizarTabelaUI();
                    }
                }
            }
        }

        // --- ROTA GOOGLE MAPS ---
        function gerarRotaMaps() {
            const enderecosValidos = Object.values(notasFiscais)
                .map(nota => nota.endereco)
                .filter(end => end && end !== "Aguardando XML...");

            if (enderecosValidos.length === 0) {
                alert("Nenhum endereço disponível para gerar a rota.");
                return;
            }

            const urlBase = "https://www.google.com/maps/dir/";
            const destinosParam = enderecosValidos.map(end => encodeURIComponent(end)).join("/");
            window.open(`${urlBase}${destinosParam}`, '_blank');
        }
    </script>
</body>
</html>
